name: Docker Image CI
on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
  workflow_dispatch: null

# Build each architecture on its own native runner (arm64 on
# ubuntu-24.04-arm, no QEMU), push by digest, then assemble one multi-arch
# manifest. Matches the pattern in boettiger-lab/k8s's own image workflows
# (commit 5350e06).
env:
  IMAGE: ghcr.io/boettiger-lab/nimbus-carbon-api

jobs:
  build:
    if: github.repository == 'boettiger-lab/nimbus-carbon-api'
    runs-on: ${{ matrix.runner }}
    permissions: write-all
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform name
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: github.repository == 'boettiger-lab/nimbus-carbon-api'
    runs-on: ubuntu-latest
    needs: build
    permissions: write-all
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)
      - name: Inspect
        run: docker buildx imagetools inspect "${IMAGE}:latest"
