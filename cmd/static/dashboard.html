<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nimbus Carbon Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a;
    --text:#e2e8f0; --muted:#64748b;
    --green:#22c55e; --yellow:#eab308; --orange:#f97316; --red:#ef4444;
    --blue:#3b82f6; --accent:#6366f1;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;}

  header{padding:1.1rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
  header h1{font-size:1.05rem;font-weight:600;letter-spacing:.02em;white-space:nowrap;}
  header h1 span{color:var(--accent);}
  .header-right{display:flex;align-items:center;gap:1rem;}
  #status{font-size:.75rem;color:var(--muted);}
  #status.ok::before{content:"● ";color:var(--green);}
  #status.err::before{content:"● ";color:var(--red);}
  header a.method-link{font-size:.75rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);border-radius:4px;padding:.25rem .6rem;}
  header a.method-link:hover{color:var(--text);border-color:var(--muted);}

  main{padding:1.5rem 2rem;max-width:1400px;margin:0 auto;}

  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.85rem;margin-bottom:1.75rem;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:.75rem;padding:.9rem 1.1rem;}
  .stat-label{font-size:.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem;}
  .stat-value{font-size:1.5rem;font-weight:700;line-height:1;}
  .stat-unit{font-size:.7rem;color:var(--muted);margin-top:.2rem;}

  .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;flex-wrap:wrap;gap:.5rem;}
  .section-head h2{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}

  .range-tabs{display:flex;gap:.35rem;}
  .range-tab{font-size:.72rem;padding:.25rem .65rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
  .range-tab:hover{color:var(--text);border-color:var(--muted);}
  .range-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  .chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:.75rem;padding:1.2rem;margin-bottom:1.75rem;}
  .chart-wrap canvas{max-height:240px;}
  .ref-frames{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.65rem;margin-top:1rem;}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:.9rem;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:.75rem;padding:1.1rem;border-left:3px solid var(--border);}
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.65rem;}
  .model-name{font-size:.83rem;font-weight:600;line-height:1.3;word-break:break-all;}
  .model-name.unknown{color:var(--muted);font-style:italic;}
  .badge{font-size:.63rem;padding:.18rem .45rem;border-radius:999px;white-space:nowrap;margin-left:.4rem;flex-shrink:0;font-weight:600;}
  .badge-active{background:rgba(34,197,94,.15);color:var(--green);}
  .badge-idle  {background:rgba(100,116,139,.15);color:var(--muted);}
  .card-meta{font-size:.7rem;color:var(--muted);margin-bottom:.85rem;}
  .card-meta span+span::before{content:" · ";}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
  .metric{background:rgba(255,255,255,.03);border-radius:.45rem;padding:.55rem .7rem;}
  .metric-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.15rem;}
  .metric-value{font-size:1rem;font-weight:700;}
  .metric-unit{font-size:.62rem;color:var(--muted);}
  .metric-value.green {color:var(--green);}
  .metric-value.yellow{color:var(--yellow);}
  .metric-value.orange{color:var(--orange);}
  .metric-value.red   {color:var(--red);}
  /* Grid intensity bar */
  .grid-intensity{margin-top:.65rem;padding-top:.65rem;border-top:1px solid var(--border);}
  .grid-intensity-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.4rem;font-size:.68rem;}
  .grid-location{color:var(--muted);}
  .grid-value{font-weight:600;font-size:.72rem;}
  .grid-track{position:relative;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:visible;margin-bottom:.3rem;}
  body.light .grid-track{background:rgba(0,0,0,.07);}
  /* gradient fill behind the track: clean green → coal red */
  .grid-track-fill{position:absolute;inset:0;border-radius:4px;
    background:linear-gradient(to right,#22c55e 0%,#eab308 35%,#f97316 60%,#ef4444 100%);
    opacity:.18;}
  body.light .grid-track-fill{opacity:.25;}
  /* node marker */
  .grid-marker{position:absolute;top:-3px;width:3px;height:14px;border-radius:2px;transform:translateX(-50%);}
  /* US average reference tick */
  .grid-avg-tick{position:absolute;top:-4px;width:1px;height:16px;background:var(--muted);opacity:.5;transform:translateX(-50%);}
  .grid-legend{display:flex;justify-content:space-between;font-size:.6rem;color:var(--muted);}

  /* CO₂/token comparison bar embedded in card */
  .token-cmp{margin-top:.65rem;padding-top:.65rem;border-top:1px solid var(--border);}
  .token-cmp-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.45rem;}
  .token-cmp-track{position:relative;height:18px;background:rgba(255,255,255,.04);border-radius:3px;overflow:visible;}
  /* shaded band for commercial estimate range */
  .token-cmp-band{position:absolute;top:0;height:100%;background:rgba(99,102,241,.15);border-radius:3px;}
  /* nimbus measured bar */
  .token-cmp-bar{position:absolute;top:2px;height:14px;border-radius:2px;transition:width .4s;}
  /* commercial midpoint tick */
  .token-cmp-tick{position:absolute;top:-3px;width:2px;height:24px;background:#6366f1;border-radius:1px;}
  .token-cmp-legend{display:flex;justify-content:space-between;margin-top:.35rem;font-size:.65rem;color:var(--muted);}
  .token-cmp-ratio{font-size:.72rem;margin-top:.3rem;font-weight:600;color:var(--text);}

  /* Live engine activity (running/waiting requests, KV cache, GPU util) */
  .activity{margin-top:.65rem;padding-top:.65rem;border-top:1px solid var(--border);}
  .activity-header{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.45rem;}
  .activity-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(85px,1fr));gap:.5rem;}

  footer{text-align:center;padding:2rem;font-size:.71rem;color:var(--muted);}
  footer a{color:var(--muted);}

  /* Light mode overrides */
  body.light {
    --bg:#f8fafc; --surface:#ffffff; --border:#e2e8f0;
    --text:#1e293b; --muted:#64748b;
  }
  body.light .metric{background:rgba(0,0,0,.03);}
  body.light .token-cmp-track{background:rgba(0,0,0,.04);}

  #theme-btn{font-size:.72rem;padding:.25rem .65rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
  #theme-btn:hover{color:var(--text);border-color:var(--muted);}
</style>
</head>
<body>
<header>
  <h1>nimbus <span>Carbon</span> Dashboard</h1>
  <div class="header-right">
    <a class="method-link" href="/methodology">Methodology</a>
    <a class="method-link" href="https://github.com/boettiger-lab/nimbus-carbon-api" target="_blank">GitHub</a>
    <button id="theme-btn" onclick="toggleTheme()">Light</button>
    <span id="status">loading…</span>
  </div>
</header>

<main>
  <div class="summary" id="summary"></div>

  <div class="chart-wrap">
    <div class="section-head">
      <h2>Cluster CO₂ emissions over time</h2>
      <div class="range-tabs" id="time-range-tabs">
        <button class="range-tab" data-range="24h">24 h</button>
        <button class="range-tab active" data-range="7d">7 d</button>
        <button class="range-tab" data-range="30d">30 d</button>
      </div>
    </div>
    <canvas id="lineChart"></canvas>
    <div class="ref-frames" id="ref-frames"></div>
  </div>

  <div class="section-head" style="margin-top:1.75rem">
    <h2>Models</h2>
  </div>
  <div class="cards" id="cards"></div>
</main>

<footer>
  Data from nimbus's own Prometheus (DCGM GPU sensors) ·
  Grid intensity: <a href="https://www.epa.gov/egrid" target="_blank">EPA eGRID 2022</a> ·
  <a href="/methodology">Methodology &amp; References</a> ·
  <a href="https://github.com/boettiger-lab/nimbus-carbon-api" target="_blank">Source on GitHub</a> ·
  Refreshes every 30 s
</footer>

<script>
const API    = '/api/v1/carbon';
const TS_API = '/api/v1/carbon/timeseries';
let lineChart = null;
let currentRange = '7d';
let lastData = null;
let lastEmissionsTotalGrams = 0;

function chartColors() {
  const light = document.body.classList.contains('light');
  return {
    grid:   light ? '#e2e8f0' : '#2a2d3a',
    tick:   light ? '#64748b' : '#64748b',
    legend: light ? '#334155' : '#94a3b8',
  };
}

function applyChartTheme() {
  const c = chartColors();
  [lineChart].forEach(ch => {
    if (!ch) return;
    Object.values(ch.options.scales).forEach(s => {
      if (s.grid)  s.grid.color   = c.grid;
      if (s.ticks) s.ticks.color  = c.tick;
      if (s.title) s.title.color  = c.tick;
    });
    if (ch.options.plugins.legend?.labels) ch.options.plugins.legend.labels.color = c.legend;
    if (ch.options.plugins.title) ch.options.plugins.title.color = c.tick;
    ch.update('none');
  });
}

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isLight ? 'Dark' : 'Light';
  applyChartTheme();
}

function initTheme() {
  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('theme-btn').textContent = 'Dark';
  }
}
initTheme();

// Commercial frontier model: physics-based power estimate for apples-to-apples comparison.
// For each nimbus model we ask: "What would a commercial frontier cluster draw to serve the same tokens?"
// This includes the hosting floor (idle power to keep model in memory) + marginal per-token energy.
//
// Spec: ~1.5T MoE, ~300B active params, FP8 inference.
// Hardware: 24× H100-80GB minimum (1.5 TB weights + KV cache + activations → need ≥1.92 TB HBM).
//
// Prefill (compute-bound): 2×300B = 600 GFLOPS/token. 24× H100 at 60% util = 14,200 TFLOPS.
//   Throughput: ~23,700 tok/s. Marginal power above idle: (700−225)×24 = 11,400 W.
//   → ~0.5 J/input-token marginal.
//
// Decode (memory-bandwidth-bound): must load 300 GB active weights per step.
//   24× H100 at 3.35 TB/s = 80.4 TB/s → 270 tok/s per sequence.
//   At low batch (B≈1–4, matching typical nimbus traffic): ~100–150 W above idle per GPU.
//   → ~6 J/output-token marginal.
//
// Sources: H100 specs (NVIDIA), transformer FLOPs scaling, Delavande et al. (2025).
const FRONTIER = {
  label: 'Commercial frontier',
  desc: '~1.5T MoE, ~300B active · 24× H100-80GB',
  numGPUs: 24,
  idleWattsPerGPU: 225,
  prefillJPerToken: 0.5,
  decodeJPerToken: 6.0,
};
const FRONTIER_IDLE_W = FRONTIER.numGPUs * FRONTIER.idleWattsPerGPU; // 5400 W

// Everyday reference frames for CO2 totals, in the style of CodeCarbon.
// Sources cited in /methodology.
const REF_CAR_G_PER_MILE = 404;       // EPA: average gasoline passenger vehicle, g CO2/mile
const REF_PHONE_CHARGE_G = 8.22;      // g CO2 per full smartphone charge (commonly cited estimate)
const REF_FRIDGE_WATTS = 150;         // average household refrigerator draw, W
const REF_TREE_KG_PER_MONTH = 1.75;   // kg CO2 absorbed per mature tree per month (rough estimate)

function frontierWatts(promptTokPerSec, genTokPerSec) {
  return FRONTIER_IDLE_W
       + promptTokPerSec * FRONTIER.prefillJPerToken
       + genTokPerSec    * FRONTIER.decodeJPerToken;
}

function intensityColor(kg){ return kg<=.25?'#22c55e':kg<=.40?'#eab308':kg<=.55?'#f97316':'#ef4444'; }

// nimbus has exactly one fixed location — Berkeley, CA (CAMX eGRID
// subregion) — so this is a constant, not a lookup. hostname is accepted
// (and ignored) to keep the call site at the model card unchanged.
function locationLabel(hostname) {
  return 'Berkeley, CA · <a href="/methodology" style="color:inherit;text-decoration:none">CAMX</a>';
}
function co2Color(gph){ return gph<100?'green':gph<300?'yellow':gph<600?'orange':'red'; }
function fmt(n,d=1){ return (n==null||isNaN(n))?'—':n.toFixed(d); }
function shortModel(name){ if(!name)return null; const p=name.split('/'); return p[p.length-1]; }

async function load() {
  const st = document.getElementById('status');
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    render(data);
    st.textContent = 'Updated ' + new Date(data.updated_at).toLocaleTimeString();
    st.className = 'ok';
  } catch(e) {
    st.textContent = 'Error: ' + e.message;
    st.className = 'err';
  }
}

async function loadTimeSeries(range) {
  try {
    const res = await fetch(`${TS_API}?range=${range}`);
    const data = await res.json();
    renderTimeSeries(data);
  } catch(e) { console.warn('timeseries:', e); }
}

function render(data) {
  lastData = data;
  const models = (data.models||[]).slice().sort((a,b)=>b.co2_grams_per_hour-a.co2_grams_per_hour);

  const totalPower   = models.reduce((s,m)=>s+m.power_watts,0);
  const totalCO2hr   = models.reduce((s,m)=>s+m.co2_grams_per_hour,0);
  const totalGPUs    = models.reduce((s,m)=>s+m.gpu_count,0);
  const activeN      = models.filter(m=>m.tokens_per_sec>0.1).length;
  const avgIntensity = models.length ? models.reduce((s,m)=>s+m.carbon_intensity_kg_per_kwh,0)/models.length : 0;

  document.getElementById('summary').innerHTML = `
    <div class="stat"><div class="stat-label">Total Power</div><div class="stat-value">${fmt(totalPower/1000,2)}</div><div class="stat-unit">kilowatts</div></div>
    <div class="stat"><div class="stat-label">CO₂ / hour</div><div class="stat-value">${fmt(totalCO2hr/1000,2)}</div><div class="stat-unit">kg CO₂e</div></div>
    <div class="stat"><div class="stat-label">CO₂ / day</div><div class="stat-value">${fmt(totalCO2hr*24/1000,1)}</div><div class="stat-unit">kg CO₂e</div></div>
    <div class="stat"><div class="stat-label">Active GPUs</div><div class="stat-value">${totalGPUs}</div><div class="stat-unit">across ${models.length} models</div></div>
    <div class="stat"><div class="stat-label">Active Models</div><div class="stat-value">${activeN}</div><div class="stat-unit">generating tokens</div></div>
    <div class="stat"><div class="stat-label">Avg Grid Intensity</div><div class="stat-value">${fmt(avgIntensity,3)}</div><div class="stat-unit">kg CO₂/kWh</div></div>
  `;

  // Model cards
  document.getElementById('cards').innerHTML = models.map(m=>{
    const active = m.tokens_per_sec > 0.1;
    const cc  = co2Color(m.co2_grams_per_hour);
    const dot = intensityColor(m.carbon_intensity_kg_per_kwh);
    const promptPct = active && m.tokens_per_sec > 0 ? (m.prompt_tokens_per_sec / m.tokens_per_sec * 100) : null;

    // J/token = power_watts_avg_24h / (prompt+gen)_tokens_per_sec_avg_24h, gated
    // the same way the removed comparison chart gated it — plain number, '—'
    // when there isn't enough data, no comparison framing.
    const jTok = (m.prompt_tokens_per_sec_avg_24h||0) + (m.generation_tokens_per_sec_avg_24h||0);
    const jPerToken = jTok > 0.1 && m.power_watts_avg_24h > 0
      ? m.power_watts_avg_24h / jTok
      : null;

    // Frontier-model comparison: shown only while actively generating (24h-avg
    // combined tok/s > 1) — while idle this is omitted entirely, not shown as
    // good or bad. Plain informational text/visualization only, no color
    // verdict: nimbus's absolute power draw is real regardless of how it
    // compares to a hypothetical 24-GPU commercial cluster, and idling low is
    // expected behavior for this hardware, not something to judge either way.
    const avgPrompt = m.prompt_tokens_per_sec_avg_24h ?? m.prompt_tokens_per_sec ?? 0;
    const avgGen    = m.generation_tokens_per_sec_avg_24h ?? m.generation_tokens_per_sec ?? 0;
    const isGenerating24h = (avgPrompt + avgGen) > 1;
    const fw   = frontierWatts(avgPrompt, avgGen);
    const nrpW = m.power_watts_avg_24h || m.power_watts;
    const has24h = m.power_watts_avg_24h != null && m.power_watts_avg_24h > 0;
    const windowLabel = has24h ? '24h avg' : '5-min';
    let wattsCmp = '';
    let frontierMetric = '';
    if (isGenerating24h && nrpW > 0) {
      const ratio = fw / nrpW;
      const nrpPct = Math.min(nrpW / fw * 100, 100).toFixed(1);
      const ratioText = ratio >= 1.05
        ? `${ratio.toFixed(1)}× less energy than ${FRONTIER.label} for same tokens`
        : ratio < 0.95
          ? `${(1/ratio).toFixed(1)}× more energy than ${FRONTIER.label}`
          : `≈ same energy as ${FRONTIER.label}`;
      const fIdleW = FRONTIER_IDLE_W;
      const fMargW = fw - fIdleW;
      wattsCmp = `
        <div class="token-cmp">
          <div class="token-cmp-label">Power (${windowLabel}): nimbus vs. ${FRONTIER.label} for same tokens</div>
          <div class="token-cmp-track">
            <div class="token-cmp-bar" style="width:${nrpPct}%;background:#6366f1;top:2px;height:14px;border-radius:2px"></div>
            <div style="position:absolute;top:2px;left:0;width:100%;height:14px;border-radius:2px;background:rgba(99,102,241,0.18)"></div>
          </div>
          <div class="token-cmp-legend">
            <span style="color:var(--text)">nimbus: ${nrpW.toLocaleString(undefined,{maximumFractionDigits:0})} W</span>
            <span style="color:#6366f1">${FRONTIER.label}: ${fw.toLocaleString(undefined,{maximumFractionDigits:0})} W <span style="opacity:.6">(${fIdleW.toLocaleString()} idle + ${fMargW.toLocaleString(undefined,{maximumFractionDigits:0})} marginal)</span></span>
          </div>
          <div class="token-cmp-ratio">${ratioText}</div>
        </div>`;
      const frontierUnitText = ratio >= 1.05 ? 'less energy' : ratio < 0.95 ? 'more energy' : 'same energy';
      frontierMetric = `<div class="metric"><div class="metric-label">vs. ${FRONTIER.label}</div><div class="metric-value">${fmt(fw/nrpW,1)}×</div><div class="metric-unit">${frontierUnitText} · ${windowLabel}</div></div>`;
    }

    return `
    <div class="card">
      <div class="card-header">
        <div class="model-name ${m.model_name?'':'unknown'}">${m.model_name||m.container}</div>
        <span class="badge ${active?'badge-active':'badge-idle'}">${active?'active':'idle'}</span>
      </div>
      <div class="card-meta">
        <span>${m.gpu_count}× ${m.gpu_hardware||'—'}</span>
        ${promptPct != null ? `<span>${fmt(promptPct,0)}% input tokens</span>` : ''}
      </div>
      <div class="metrics">
        <div class="metric"><div class="metric-label">CO₂ / hr</div><div class="metric-value ${cc}">${fmt(m.co2_grams_per_hour)}</div><div class="metric-unit">grams</div></div>
        <div class="metric"><div class="metric-label">GPU Power</div><div class="metric-value">${fmt(m.power_watts)}</div><div class="metric-unit">watts</div></div>
        <div class="metric"><div class="metric-label">CO₂ / token</div><div class="metric-value">${m.co2_mg_per_token?fmt(m.co2_mg_per_token,3):'—'}</div><div class="metric-unit">mg · 5 min${m.co2_mg_per_token_avg_24h ? ` · <span style="color:var(--muted)">24h avg: ${fmt(m.co2_mg_per_token_avg_24h,3)}</span>` : ''}</div></div>
        <div class="metric"><div class="metric-label">Input tok/s</div><div class="metric-value">${active?fmt(m.prompt_tokens_per_sec):'—'}</div><div class="metric-unit">tok/s prompt</div></div>
        <div class="metric"><div class="metric-label">Output tok/s</div><div class="metric-value">${active?fmt(m.generation_tokens_per_sec):'—'}</div><div class="metric-unit">tok/s generated</div></div>
        <div class="metric"><div class="metric-label">J / token</div><div class="metric-value">${jPerToken!=null?fmt(jPerToken,3):'—'}</div><div class="metric-unit">joules · 24h avg</div></div>
        ${frontierMetric}
      </div>
      ${wattsCmp}
      <div class="activity">
        <div class="activity-header">Live Activity</div>
        <div class="activity-grid">
          <div class="metric"><div class="metric-label">Running</div><div class="metric-value">${fmt(m.num_requests_running,0)}</div><div class="metric-unit">requests</div></div>
          <div class="metric"><div class="metric-label">Queued</div><div class="metric-value">${fmt(m.num_requests_waiting,0)}</div><div class="metric-unit">requests</div></div>
          <div class="metric"><div class="metric-label">KV Cache</div><div class="metric-value">${fmt(m.kv_cache_usage_percent)}</div><div class="metric-unit">percent</div></div>
          <div class="metric"><div class="metric-label">GPU Util</div><div class="metric-value">${fmt(m.gpu_util_percent)}</div><div class="metric-unit">percent</div></div>
          <div class="metric"><div class="metric-label">Requests</div><div class="metric-value">${fmt(m.requests_per_hour)}</div><div class="metric-unit">per hour</div></div>
          ${m.mtp_acceptance_percent!=null ? `<div class="metric"><div class="metric-label">MTP Accept</div><div class="metric-value">${fmt(m.mtp_acceptance_percent)}</div><div class="metric-unit">percent</div></div>` : ''}
        </div>
      </div>
      <div class="grid-intensity">
        <div class="grid-intensity-header">
          <span class="grid-location">${locationLabel(m.node)}</span>
          <span class="grid-value" style="color:${dot}">${m.carbon_intensity_kg_per_kwh} kg CO₂/kWh</span>
        </div>
        <div class="grid-track">
          <div class="grid-track-fill"></div>
          <div class="grid-avg-tick" style="left:${(0.386/0.75*100).toFixed(1)}%"></div>
          <div class="grid-marker" style="left:${Math.min(m.carbon_intensity_kg_per_kwh/0.75*100,100).toFixed(1)}%;background:${dot}"></div>
        </div>
        <div class="grid-legend">
          <span>clean</span>
          <span>US avg</span>
          <span>coal</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// The backend always emits step as one of "5m0s", "1h0m0s", "6h0m0s"
// (Go's time.Duration.String()) -- parse the h/m/s components present.
function parseStepSeconds(stepStr) {
  const h = /(\d+)h/.exec(stepStr);
  const m = /(\d+)m/.exec(stepStr);
  const s = /(\d+)s/.exec(stepStr);
  return (h?+h[1]*3600:0) + (m?+m[1]*60:0) + (s?+s[1]:0);
}

// Cumulative CO₂ emissions over the selected window — integrates the
// co2_grams_per_hour rate series using the rectangle rule (rate × step
// duration), running-summed. Always populated as long as the range has any
// points, even during idle periods (the total simply grows slowly).
function renderTimeSeries(data) {
  const pts = data.points || [];
  if (!pts.length) return;

  const rangeLabel = {'24h':'past 24 hours','7d':'past 7 days','30d':'past 30 days'}[currentRange]||currentRange;

  const mkLabel = p => {
    const d = new Date(p.t * 1000);
    if (currentRange === '24h') return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    if (currentRange === '7d')  return d.toLocaleDateString([],{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString([],{month:'short',day:'numeric'});
  };

  const stepHours = parseStepSeconds(data.step) / 3600;
  let running = 0;
  const cumulativeGrams = pts.map(p => {
    running += p.co2_grams_per_hour * stepHours;
    return +running.toFixed(2);
  });
  lastEmissionsTotalGrams = running;
  renderReferenceFrames(running);

  const totalLabel = running >= 1000
    ? (running/1000).toFixed(2) + ' kg CO₂e'
    : running.toFixed(1) + ' g CO₂e';

  const chartData = {
    labels: pts.map(mkLabel),
    datasets: [{
      label: 'Cumulative CO₂ (g)',
      data: cumulativeGrams,
      borderColor: '#6366f1',
      backgroundColor: 'rgba(99,102,241,0.1)',
      fill: true, tension: 0.3, pointRadius: 0,
    }],
  };
  const lc = chartColors();
  const options = {
    responsive: true,
    interaction: { mode:'index', intersect:false },
    plugins: {
      legend: { labels:{ color:lc.legend, font:{size:10}, boxWidth:12 } },
      title: { display:true, text:`${rangeLabel} — Total: ${totalLabel}`,
               color:lc.tick, font:{size:11, weight:'normal'}, padding:{bottom:8} },
      tooltip: { callbacks: { label: c => ` ${c.parsed.y.toFixed(2)} g CO₂ cumulative` } }
    },
    scales: {
      x: { ticks:{color:lc.tick,font:{size:10},maxTicksLimit:10}, grid:{color:lc.grid} },
      y: { ticks:{color:lc.tick,font:{size:10}}, grid:{color:lc.grid},
           title:{display:true, text:'g CO₂ (cumulative)', color:lc.tick, font:{size:10}},
           beginAtZero:true }
    }
  };

  if (lineChart) {
    lineChart.data = chartData;
    lineChart.options.plugins.title.text = `${rangeLabel} — Total: ${totalLabel}`;
    lineChart.update('none');
  } else {
    lineChart = new Chart(document.getElementById('lineChart'), { type:'line', data:chartData, options });
  }
}

// Converts a cumulative CO2 total (grams) into a few widely-cited everyday
// equivalents. The fridge comparison intentionally uses nimbus's own grid
// intensity (from the current model data) rather than a separate reference
// intensity, so it's an apples-to-apples "same grid, different appliance"
// comparison.
function renderReferenceFrames(totalGrams) {
  const el = document.getElementById('ref-frames');
  if (!el) return;

  const gridIntensity = (lastData && lastData.models && lastData.models[0])
    ? lastData.models[0].carbon_intensity_kg_per_kwh
    : 0.198;

  const miles = totalGrams / REF_CAR_G_PER_MILE;
  const charges = totalGrams / REF_PHONE_CHARGE_G;
  const fridgeGPerHour = (REF_FRIDGE_WATTS / 1000) * gridIntensity * 1000; // kW × kg/kWh × 1000 g/kg
  const fridgeMinutes = fridgeGPerHour > 0 ? (totalGrams / fridgeGPerHour) * 60 : 0;
  const treeMonths = totalGrams / (REF_TREE_KG_PER_MONTH * 1000);

  const tiles = [
    { label: 'Miles driven', value: fmt(miles, miles < 1 ? 3 : 1), unit: 'gas car (EPA avg)' },
    { label: 'Phone charges', value: fmt(charges, charges < 1 ? 2 : 0), unit: 'full charges' },
    { label: 'Fridge runtime', value: fmt(fridgeMinutes, fridgeMinutes < 1 ? 2 : 0), unit: 'minutes' },
    { label: 'Tree absorption', value: fmt(treeMonths, 3), unit: 'tree-months' },
  ];
  el.innerHTML = tiles.map(t => `
    <div class="stat">
      <div class="stat-label">${t.label}</div>
      <div class="stat-value">${t.value}</div>
      <div class="stat-unit">${t.unit}</div>
    </div>`).join('');
}

document.querySelectorAll('#time-range-tabs .range-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#time-range-tabs .range-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentRange = btn.dataset.range;
    if (lineChart) { lineChart.destroy(); lineChart = null; }
    loadTimeSeries(currentRange);
  });
});

load();
loadTimeSeries(currentRange);
setInterval(load, 30000);
setInterval(() => loadTimeSeries(currentRange), 300000);
</script>
